name: 🎮 Update Quest Progress

on:
  issues:
    types: [closed, reopened]

permissions:
  contents: write

jobs:
  update-progress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate and update README
        id: calc
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Fetch all issues (paginate if needed)
            let allIssues = [];
            let page = 1;
            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                per_page: 100,
                page: page,
              });
              allIssues = allIssues.concat(issues);
              if (issues.length < 100) break;
              page++;
            }

            // XP map by label
            const xpMap = { '📗 Easy': 10, '📙 Medium': 25, '📕 Hard': 50, '🏆 Boss': 100 };
            let totalXP = 0, earnedXP = 0, totalQuests = 0, closedQuests = 0;
            const domainStatus = {};

            for (const issue of allIssues) {
              if (issue.pull_request) continue;
              const labels = issue.labels.map(l => l.name);

              let questXP = 0;
              for (const [label, xp] of Object.entries(xpMap)) {
                if (labels.includes(label)) { questXP = xp; break; }
              }
              if (questXP === 0) continue;

              totalQuests++;
              totalXP += questXP;

              const domainLabel = labels.find(l => l.startsWith('Domain'));
              if (domainLabel) {
                if (!domainStatus[domainLabel]) domainStatus[domainLabel] = { total: 0, closed: 0 };
                domainStatus[domainLabel].total++;
              }

              if (issue.state === 'closed') {
                closedQuests++;
                earnedXP += questXP;
                if (domainLabel) domainStatus[domainLabel].closed++;
              }
            }

            // Determine level
            const levels = [
              { title: '🎓 Certified!', xp: 1745 },
              { title: '👑 Master', xp: 1300 },
              { title: '💎 Expert', xp: 900 },
              { title: '🥇 Practitioner', xp: 500 },
              { title: '🥈 Apprentice', xp: 200 },
              { title: '🥉 Noob', xp: 0 },
            ];
            let level = '🥉 Noob';
            for (const l of levels) {
              if (earnedXP >= l.xp) { level = l.title; break; }
            }

            // Domains cleared
            let domainsCleared = 0;
            for (const [, s] of Object.entries(domainStatus)) {
              if (s.total > 0 && s.closed === s.total) domainsCleared++;
            }

            // Progress bar
            const pct = totalQuests > 0 ? Math.round((closedQuests / totalQuests) * 100) : 0;
            const filled = Math.round(pct * 30 / 100);
            const bar = '█'.repeat(filled) + '░'.repeat(30 - filled);

            // Build replacement
            const progress = [
              '<!-- PROGRESS_START -->',
              '| 🎯 Quest Progress | |',
              '|---|---|',
              `| **Level** | ${level} |`,
              `| **XP** | ${earnedXP} / 1,745 |`,
              `| **Quests** | ${closedQuests} / ${totalQuests} completed |`,
              `| **Domains** | ${domainsCleared} / 7 cleared |`,
              '',
              '```',
              `[${bar}] ${pct}%`,
              '```',
              '<!-- PROGRESS_END -->',
            ].join('\n');

            // Replace in README
            let readme = fs.readFileSync('README.md', 'utf8');
            const markerRe = /<!-- PROGRESS_START -->[\s\S]*?<!-- PROGRESS_END -->/;
            if (markerRe.test(readme)) {
              readme = readme.replace(markerRe, progress);
            } else {
              // Fallback: if markers got corrupted, find $PROGRESS or insert after dashboard header
              readme = readme.replace('$PROGRESS', progress);
            }
            fs.writeFileSync('README.md', readme);

            core.setOutput('earned_xp', earnedXP);
            core.setOutput('closed', closedQuests);
            core.setOutput('total', totalQuests);
            core.setOutput('level', level);

            console.log(`Progress: ${earnedXP} XP | ${closedQuests}/${totalQuests} quests | ${level}`);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "🎮 Progress: ${{ steps.calc.outputs.earned_xp }} XP | ${{ steps.calc.outputs.closed }}/${{ steps.calc.outputs.total }} quests | ${{ steps.calc.outputs.level }}"
          git push
